<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ZELL Report __ZELL_TITLE__</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.15.0/umd/Recharts.js"></script>
<script crossorigin src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
<style>
* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: #ececec;
  color: #111827;
  font-family: "Inter", system-ui, -apple-system, Segoe UI, sans-serif;
}

#root {
  height: 100%;
}

.miro-report-shell {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #f3f4f6;
}

.top-bar {
  height: 48px;
  border-bottom: 1px solid #e5e7eb;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  position: sticky;
  top: 0;
  z-index: 20;
}

.brand {
  font-family: "JetBrains Mono", monospace;
  letter-spacing: 0.08em;
  font-size: 16px;
  font-weight: 700;
}

.top-bar-right {
  display: flex;
  align-items: center;
  gap: 8px;
  color: #6b7280;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.top-bar-right .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #10b981;
}

.main-split-layout {
  flex: 1;
  display: grid;
  grid-template-columns: minmax(560px, 1.05fr) minmax(420px, 0.95fr);
  gap: 0;
  min-height: 0;
}

.report-reading-panel {
  background: #ffffff;
  border-right: 1px solid #e5e7eb;
  overflow-y: auto;
  padding: 28px 22px 24px;
}

.report-content-wrapper {
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
}

.report-header-block {
  margin-bottom: 28px;
}

.report-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.report-tag {
  background: #111111;
  color: #ffffff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 8px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  border-radius: 2px;
}

.report-id {
  font-size: 11px;
  color: #9ca3af;
  font-family: "JetBrains Mono", monospace;
  letter-spacing: 0.02em;
}

.report-status {
  font-size: 10px;
  color: #10b981;
  border: 1px solid #d1fae5;
  background: #ecfdf5;
  border-radius: 999px;
  padding: 3px 8px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

.main-title {
  font-family: "Times New Roman", Times, serif;
  font-size: clamp(30px, 3.2vw, 44px);
  font-weight: 700;
  color: #111827;
  line-height: 1.16;
  margin: 0 0 12px 0;
  letter-spacing: -0.02em;
}

.sub-title {
  font-family: "Times New Roman", Times, serif;
  font-size: 16px;
  color: #6b7280;
  font-style: italic;
  line-height: 1.5;
  margin: 0 0 14px 0;
}

.report-footnote {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  color: #9ca3af;
  margin-bottom: 12px;
}

.header-divider {
  height: 1px;
  background: #e5e7eb;
  width: 100%;
}

.narrative-section {
  margin-bottom: 28px;
}

.section-title-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.section-index {
  font-family: "JetBrains Mono", monospace;
  font-size: 11px;
  color: #9ca3af;
}

.section-title-row h3 {
  margin: 0;
  font-size: 29px;
  line-height: 1;
  font-family: "Times New Roman", Times, serif;
  font-weight: 700;
  color: #1f2937;
}

.narrative-section p {
  margin: 0 0 12px;
  color: #374151;
  font-size: 15px;
  line-height: 1.74;
}

.narrative-section blockquote {
  margin: 0;
  border-left: 3px solid #d1d5db;
  padding: 10px 12px;
  font-style: italic;
  color: #4b5563;
  background: #f9fafb;
}

.inline-note {
  border-left: 2px solid #e5e7eb;
  padding-left: 10px;
  color: #6b7280;
  font-style: italic;
}

.action-list {
  display: flex;
  flex-direction: column;
  gap: 11px;
}

.action-item {
  border: 1px solid #f1f5f9;
  background: #fbfdff;
  border-radius: 8px;
  padding: 10px 11px;
}

.action-head {
  font-size: 12px;
  color: #6b7280;
  font-family: "JetBrains Mono", monospace;
  margin-bottom: 5px;
}

.report-workbench-panel {
  background: #f9fafb;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.workflow-rail {
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  background: #ffffff;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.workflow-rail__header {
  border-bottom: 1px solid #f3f4f6;
  padding-bottom: 8px;
}

.workflow-rail__kicker {
  margin: 0;
  color: #9ca3af;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-family: "JetBrains Mono", monospace;
}

.workflow-rail__header h3 {
  margin: 7px 0 2px;
  font-size: 18px;
}

.workflow-rail__header p {
  margin: 0;
  font-size: 12px;
  color: #6b7280;
}

.workflow-progress__track {
  height: 6px;
  border-radius: 999px;
  overflow: hidden;
  background: #e5e7eb;
}

.workflow-progress__fill {
  height: 100%;
  background: linear-gradient(90deg, #0f172a, #2563eb);
  transition: width .35s ease;
}

.workflow-progress p {
  margin: 6px 0 0;
  font-size: 11px;
  color: #6b7280;
  font-family: "JetBrains Mono", monospace;
}

.workflow-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.workflow-item {
  position: relative;
  padding-left: 22px;
  min-height: 42px;
}

.workflow-item__line {
  position: absolute;
  left: 6px;
  top: 14px;
  bottom: -15px;
  width: 1px;
  background: #e5e7eb;
}

.workflow-item:last-child .workflow-item__line {
  display: none;
}

.workflow-item__dot {
  position: absolute;
  left: 0;
  top: 7px;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  border: 1px solid #d1d5db;
  background: #f3f4f6;
}

.workflow-item.is-done .workflow-item__dot {
  background: #10b981;
  border-color: #10b981;
}

.workflow-item.is-current .workflow-item__dot {
  background: #2563eb;
  border-color: #2563eb;
}

.workflow-item__title {
  margin: 0;
  display: flex;
  gap: 8px;
  align-items: center;
  font-size: 13px;
  color: #111827;
}

.workflow-item__title span {
  font-family: "JetBrains Mono", monospace;
  font-size: 10px;
  color: #9ca3af;
}

.workflow-item__meta {
  margin: 3px 0 0;
  font-size: 11px;
  color: #6b7280;
}

.workflow-rail__foot {
  border-top: 1px solid #f3f4f6;
  padding-top: 8px;
}

.workflow-rail__foot p {
  margin: 0;
  color: #9ca3af;
  font-size: 10px;
  font-family: "JetBrains Mono", monospace;
}

.glass-panel {
  border: 1px solid #e5e7eb;
  border-radius: 12px;
  background: #ffffff;
  padding: 12px;
}

.glass-panel__header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 10px;
}

.glass-panel__accent {
  width: 3px;
  height: 24px;
  border-radius: 3px;
  margin-top: 2px;
}

.glass-panel__header h3 {
  margin: 0;
  font-size: 14px;
  color: #111827;
}

.glass-panel__header p {
  margin: 3px 0 0;
  color: #9ca3af;
  font-size: 11px;
}

.workbench-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.metric-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.metric-tile {
  border: 1px solid #eef2f7;
  border-radius: 10px;
  padding: 10px;
  background: #fcfdff;
  position: relative;
  overflow: hidden;
}

.metric-tile__glow {
  position: absolute;
  right: -28px;
  top: -28px;
  width: 70px;
  height: 70px;
  border-radius: 50%;
  filter: blur(10px);
}

.metric-tile__label {
  margin: 0;
  font-size: 10px;
  color: #9ca3af;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: "JetBrains Mono", monospace;
}

.metric-tile__value {
  margin: 7px 0 3px;
  font-size: 20px;
  line-height: 1;
  font-weight: 700;
}

.metric-tile__hint {
  margin: 0;
  font-size: 11px;
  color: #9ca3af;
}

.legend-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  margin-top: 7px;
}

.legend-grid p {
  margin: 0;
  font-size: 11px;
  color: #6b7280;
  display: flex;
  align-items: center;
  gap: 5px;
}

.legend-grid span {
  width: 7px;
  height: 7px;
  border-radius: 2px;
  display: inline-block;
}

.chart-tip {
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  background: #ffffff;
  padding: 8px;
  font-size: 11px;
  color: #111827;
}

.chart-tip__title {
  margin: 0 0 5px;
  font-size: 10px;
  color: #6b7280;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: "JetBrains Mono", monospace;
}

.chart-tip p {
  margin: 2px 0;
}

.anomaly-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 240px;
  overflow: auto;
}

.anomaly-item {
  border: 1px solid;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  gap: 7px;
  background: #fff5f7;
}

.anomaly-item__dot {
  margin-top: 5px;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.anomaly-item p {
  margin: 0;
  font-size: 12px;
  color: #4b5563;
}

.notes-box {
  margin-top: 8px;
  border: 1px solid #e5e7eb;
  background: #f9fafb;
  border-radius: 8px;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.notes-box p {
  margin: 0;
  font-size: 10px;
  color: #6b7280;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  font-family: "JetBrains Mono", monospace;
}

.notes-box span {
  font-size: 12px;
  color: #6b7280;
}

.table-wrap {
  max-height: 320px;
  overflow: auto;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
}

.table-wrap table {
  border-collapse: collapse;
  width: 100%;
  min-width: 720px;
}

.table-wrap th,
.table-wrap td {
  text-align: left;
  padding: 7px 8px;
  border-bottom: 1px solid #f3f4f6;
  font-size: 11px;
  color: #374151;
}

.table-wrap th {
  position: sticky;
  top: 0;
  background: #f9fafb;
  color: #6b7280;
  font-family: "JetBrains Mono", monospace;
  text-transform: uppercase;
  font-size: 10px;
  letter-spacing: 0.05em;
}

.muted-empty {
  margin: 6px 0;
  color: #9ca3af;
  font-size: 12px;
}

.report-footer {
  border-top: 1px solid #e5e7eb;
  background: #ffffff;
  padding: 9px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.report-footer p {
  margin: 0;
  font-size: 10px;
  color: #9ca3af;
  font-family: "JetBrains Mono", monospace;
}

::-webkit-scrollbar {
  width: 7px;
  height: 7px;
}

::-webkit-scrollbar-track {
  background: #f3f4f6;
}

::-webkit-scrollbar-thumb {
  background: #d1d5db;
  border-radius: 999px;
}

@media (max-width: 1180px) {
  .main-split-layout {
    grid-template-columns: 1fr;
  }

  .report-reading-panel {
    border-right: none;
    border-bottom: 1px solid #e5e7eb;
  }

  .workbench-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 780px) {
  .metric-grid {
    grid-template-columns: 1fr;
  }

  .report-reading-panel,
  .report-workbench-panel {
    padding: 12px;
  }

  .section-title-row h3 {
    font-size: 24px;
  }
}
</style>
</head>
<body>
<div id="root"></div>
<script>
window.__REPORT__ = __ZELL_DATA__;
</script>
<script type="text/babel">
__ZELL_JSX_BUNDLE__
</script>
</body>
</html>
